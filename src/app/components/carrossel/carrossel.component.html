  <div class="carrossel">
  <p-carousel [value]="banners" [numVisible]="1" [numScroll]="1" [circular]="false" [autoplayInterval]="3000">

    <ng-template pTemplate="item" let-banner>
      <div class="banner-container">
        <img [src]="banner.imagem" class="banner">
      </div>
    </ng-template>

  </p-carousel>
</div>
